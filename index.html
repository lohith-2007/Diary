<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Friends Diary</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cozy: {
                            bg: '#fbf9f6',
                            card: '#ffffff',
                            border: '#eae3d5',
                            text: '#3f3936',
                            textMuted: '#8b837e',
                            primary: '#d97757',
                            primaryHover: '#c46243',
                            secondary: '#e8dcca',
                            secondaryHover: '#dccab3'
                        }
                    },
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #fbf9f6;
            color: #3f3936;
        }
        
        .toast-enter {
            animation: slideInRight 0.3s ease-out forwards;
        }
        
        .toast-leave {
            animation: fadeOut 0.3s ease-out forwards;
        }
        
        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }

        .tab-btn.active {
            color: #d97757;
            border-bottom: 2px solid #d97757;
            font-weight: 500;
        }
        
        /* Custom Scrollbar for cozy feel */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #fbf9f6; 
        }
        ::-webkit-scrollbar-thumb {
            background: #e8dcca; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #dccab3; 
        }
    </style>
</head>
<body class="font-sans antialiased min-h-screen flex flex-col">

    <!-- Toast Notifications Container -->
    <div id="toast-container" class="fixed bottom-4 right-4 z-50 flex flex-col gap-2"></div>

    <!-- Auth Section -->
    <div id="auth-section" class="flex-1 flex flex-col justify-center items-center p-4">
        <div class="bg-cozy-card p-8 rounded-2xl shadow-sm border border-cozy-border w-full max-w-md text-center">
            <i class="fa-solid fa-book-journal-whills text-5xl text-cozy-primary mb-4"></i>
            <h1 class="text-3xl font-bold mb-2 text-cozy-text">Friends Diary</h1>
            <p class="text-cozy-textMuted mb-8">A cozy space for your thoughts, shared with friends.</p>
            
            <form id="login-form" class="space-y-4">
                <div>
                    <input type="text" id="username-input" placeholder="Enter a username..." required
                        class="w-full px-4 py-3 rounded-xl border border-cozy-border focus:outline-none focus:ring-2 focus:ring-cozy-primary focus:border-transparent transition text-cozy-text placeholder-cozy-textMuted bg-cozy-bg">
                </div>
                <button type="submit" 
                    class="w-full bg-cozy-primary hover:bg-cozy-primaryHover text-white font-medium py-3 rounded-xl transition duration-200 shadow-sm">
                    Enter Diary
                </button>
            </form>
            <p class="text-xs text-cozy-textMuted mt-6">No password required. Just use the same username to return.</p>
        </div>
    </div>

    <!-- Main App Section -->
    <div id="app-section" class="hidden flex-1 flex flex-col">
        
        <!-- Navigation Bar -->
        <nav class="bg-cozy-card border-b border-cozy-border sticky top-0 z-40 shadow-sm">
            <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between h-16">
                    <div class="flex items-center">
                        <i class="fa-solid fa-book-journal-whills text-2xl text-cozy-primary mr-2"></i>
                        <span class="font-bold text-xl tracking-tight text-cozy-text">Friends Diary</span>
                    </div>
                    <div class="flex items-center gap-4">
                        <div class="flex items-center text-sm font-medium text-cozy-text">
                            <i class="fa-solid fa-user-circle text-cozy-textMuted text-lg mr-1.5"></i>
                            <span id="nav-username"></span>
                        </div>
                        <button onclick="logout()" class="text-cozy-textMuted hover:text-cozy-primary transition p-2" title="Logout">
                            <i class="fa-solid fa-arrow-right-from-bracket"></i>
                        </button>
                    </div>
                </div>
            </div>
            
            <!-- Tabs -->
            <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex space-x-8 overflow-x-auto border-t border-cozy-border/50 pt-1">
                    <button onclick="switchTab('my-diary')" id="tab-my-diary" class="tab-btn active pb-3 pt-2 text-sm font-medium text-cozy-textMuted hover:text-cozy-text transition whitespace-nowrap">
                        <i class="fa-solid fa-pen-nib mr-1"></i> My Diary
                    </button>
                    <button onclick="switchTab('friends-diary')" id="tab-friends-diary" class="tab-btn pb-3 pt-2 text-sm font-medium text-cozy-textMuted hover:text-cozy-text transition whitespace-nowrap">
                        <i class="fa-solid fa-user-group mr-1"></i> Friends' Diaries
                    </button>
                    <button onclick="switchTab('find-friends')" id="tab-find-friends" class="tab-btn pb-3 pt-2 text-sm font-medium text-cozy-textMuted hover:text-cozy-text transition whitespace-nowrap">
                        <i class="fa-solid fa-magnifying-glass mr-1"></i> Find Friends
                    </button>
                </div>
            </div>
        </nav>

        <!-- Main Content Area -->
        <main class="flex-1 max-w-4xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8">
            
            <!-- My Diary Section -->
            <div id="my-diary-section" class="tab-content block">
                <!-- Write Diary Card -->
                <div class="bg-cozy-card p-6 rounded-2xl shadow-sm border border-cozy-border mb-8">
                    <h2 class="text-xl font-semibold mb-4 text-cozy-text flex items-center">
                        <i class="fa-regular fa-face-smile text-cozy-primary mr-2"></i> How was your day?
                    </h2>
                    <form id="diary-form">
                        <textarea id="diary-content" rows="4" placeholder="Dear Diary..." required
                            class="w-full px-4 py-3 rounded-xl border border-cozy-border focus:outline-none focus:ring-2 focus:ring-cozy-primary focus:border-transparent transition text-cozy-text bg-cozy-bg resize-none mb-4"></textarea>
                        
                        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                            <div class="flex items-center bg-cozy-bg rounded-lg p-1 border border-cozy-border">
                                <label class="cursor-pointer">
                                    <input type="radio" name="privacy" value="private" class="peer sr-only" checked>
                                    <div class="px-4 py-2 rounded-md text-sm font-medium text-cozy-textMuted peer-checked:bg-white peer-checked:text-cozy-text peer-checked:shadow-sm transition">
                                        <i class="fa-solid fa-lock text-xs mr-1"></i> Private
                                    </div>
                                </label>
                                <label class="cursor-pointer">
                                    <input type="radio" name="privacy" value="public" class="peer sr-only">
                                    <div class="px-4 py-2 rounded-md text-sm font-medium text-cozy-textMuted peer-checked:bg-white peer-checked:text-cozy-primary peer-checked:shadow-sm transition">
                                        <i class="fa-solid fa-globe text-xs mr-1"></i> Public to Friends
                                    </div>
                                </label>
                            </div>
                            <button type="submit" class="w-full sm:w-auto bg-cozy-primary hover:bg-cozy-primaryHover text-white font-medium px-6 py-2.5 rounded-xl transition duration-200 shadow-sm flex items-center justify-center">
                                <i class="fa-solid fa-feather mr-2"></i> Save Entry
                            </button>
                        </div>
                    </form>
                </div>

                <!-- My Diary Feed -->
                <h3 class="text-lg font-medium text-cozy-text mb-4 border-b border-cozy-border pb-2">Previous Entries</h3>
                <div id="my-diary-feed" class="space-y-4">
                    <!-- Entries injected via JS -->
                </div>
            </div>

            <!-- Friends' Diaries Section -->
            <div id="friends-diary-section" class="tab-content hidden">
                <div class="flex items-center justify-between mb-6 border-b border-cozy-border pb-2">
                    <h2 class="text-2xl font-semibold text-cozy-text">Friends' Shared Diaries</h2>
                    <i class="fa-solid fa-mug-hot text-cozy-primary text-xl"></i>
                </div>
                <div id="friends-diary-feed" class="space-y-6">
                    <!-- Entries injected via JS -->
                </div>
            </div>

            <!-- Find Friends Section -->
            <div id="find-friends-section" class="tab-content hidden">
                <div class="bg-cozy-card p-6 rounded-2xl shadow-sm border border-cozy-border mb-8">
                    <h2 class="text-2xl font-semibold mb-2 text-cozy-text">Community</h2>
                    <p class="text-cozy-textMuted mb-6 text-sm">Connect with others to share your public diary entries.</p>
                    <div id="find-friends-content">
                        <!-- Content injected via JS -->
                    </div>
                </div>
            </div>

        </main>
    </div>

    <!-- Application Logic -->
    <script>
        // --- Database Simulation (LocalStorage) ---
        const DB = {
            getUsers: () => JSON.parse(localStorage.getItem('users')) || [],
            addUser: (username) => {
                const users = DB.getUsers();
                if (!users.includes(username)) {
                    users.push(username);
                    localStorage.setItem('users', JSON.stringify(users));
                }
            },
            getFriendRequests: () => JSON.parse(localStorage.getItem('friendRequests')) || [],
            addFriendRequest: (from, to) => {
                const requests = DB.getFriendRequests();
                // Check if already exists
                if (!requests.some(r => r.from === from && r.to === to)) {
                    requests.push({ from, to, status: 'pending' });
                    localStorage.setItem('friendRequests', JSON.stringify(requests));
                }
            },
            acceptFriendRequest: (from, to) => {
                const requests = DB.getFriendRequests();
                const req = requests.find(r => r.from === from && r.to === to && r.status === 'pending');
                if (req) {
                    req.status = 'accepted';
                    localStorage.setItem('friendRequests', JSON.stringify(requests));
                }
            },
            getFriends: (username) => {
                const requests = DB.getFriendRequests();
                return requests
                    .filter(r => r.status === 'accepted' && (r.from === username || r.to === username))
                    .map(r => r.from === username ? r.to : r.from);
            },
            getDiaries: () => JSON.parse(localStorage.getItem('diaries')) || [],
            addDiary: (author, content, privacy) => {
                const diaries = DB.getDiaries();
                diaries.unshift({ id: Date.now(), author, content, privacy, timestamp: Date.now() });
                localStorage.setItem('diaries', JSON.stringify(diaries));
            }
        };

        // --- State ---
        let currentUser = null;

        // --- Utilities ---
        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    "'": '&#39;',
                    '"': '&quot;'
                }[tag] || tag)
            );
        }

        function formatTime(ms) {
            const d = new Date(ms);
            return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' }) + ' at ' + d.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            
            const bgColor = type === 'success' ? 'bg-green-100 border-green-200' : 'bg-blue-100 border-blue-200';
            const textColor = type === 'success' ? 'text-green-800' : 'text-blue-800';
            const icon = type === 'success' ? 'fa-check-circle' : 'fa-info-circle';

            toast.className = `toast-enter flex items-center p-4 mb-2 text-sm ${textColor} ${bgColor} border rounded-xl shadow-sm min-w-[250px]`;
            toast.innerHTML = `<i class="fa-solid ${icon} mr-3 text-lg"></i> <span class="font-medium">${message}</span>`;
            
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.classList.replace('toast-enter', 'toast-leave');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // --- Core Functions ---
        
        // Auth
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const usernameInput = document.getElementById('username-input').value.trim();
            if(!usernameInput) return;
            
            // Clean username to alphanumeric for simplicity
            const cleanUsername = usernameInput.replace(/[^a-zA-Z0-9_]/g, '');
            if(cleanUsername.length < 3) {
                alert("Username must be at least 3 alphanumeric characters.");
                return;
            }

            DB.addUser(cleanUsername);
            currentUser = cleanUsername;
            
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('app-section').classList.remove('hidden');
            document.getElementById('app-section').classList.add('flex');
            document.getElementById('nav-username').innerText = currentUser;
            
            showToast(`Welcome to your diary, ${currentUser}!`, 'success');
            document.getElementById('username-input').value = '';
            
            switchTab('my-diary');
        });

        function logout() {
            currentUser = null;
            document.getElementById('app-section').classList.add('hidden');
            document.getElementById('app-section').classList.remove('flex');
            document.getElementById('auth-section').classList.remove('hidden');
        }

        // Navigation
        function switchTab(tabId) {
            // Hide all contents
            document.querySelectorAll('.tab-content').forEach(el => {
                el.classList.add('hidden');
                el.classList.remove('block');
            });
            // Show target
            document.getElementById(`${tabId}-section`).classList.remove('hidden');
            document.getElementById(`${tabId}-section`).classList.add('block');
            
            // Update active state on buttons
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(`tab-${tabId}`).classList.add('active');

            // Render specific tab
            if(tabId === 'my-diary') renderMyDiary();
            if(tabId === 'friends-diary') renderFriendsDiaries();
            if(tabId === 'find-friends') renderFindFriends();
        }

        // Diary System
        document.getElementById('diary-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const content = document.getElementById('diary-content').value.trim();
            const privacy = document.querySelector('input[name="privacy"]:checked').value;
            
            if(!content) return;

            DB.addDiary(currentUser, content, privacy);
            document.getElementById('diary-content').value = '';
            
            showToast('Diary entry saved successfully.');
            renderMyDiary();
        });

        function renderMyDiary() {
            const container = document.getElementById('my-diary-feed');
            const diaries = DB.getDiaries().filter(d => d.author === currentUser);
            
            if(diaries.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-12 bg-white rounded-2xl border border-cozy-border border-dashed">
                        <i class="fa-solid fa-feather-pointed text-4xl text-cozy-border mb-3 block"></i>
                        <p class="text-cozy-textMuted">Your diary is completely empty.<br>Write your first entry above!</p>
                    </div>`;
                return;
            }
            
            let html = '';
            diaries.forEach(d => {
                const isPrivate = d.privacy === 'private';
                const iconHtml = isPrivate 
                    ? `<span class="inline-flex items-center px-2.5 py-1 rounded-md text-xs font-medium bg-gray-100 text-gray-600"><i class="fa-solid fa-lock mr-1.5"></i> Private</span>` 
                    : `<span class="inline-flex items-center px-2.5 py-1 rounded-md text-xs font-medium bg-blue-50 text-blue-600 border border-blue-100"><i class="fa-solid fa-globe mr-1.5"></i> Public to Friends</span>`;
                
                html += `
                <div class="bg-cozy-card p-5 sm:p-6 rounded-2xl border border-cozy-border shadow-sm hover:shadow-md transition duration-200">
                    <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center mb-4 gap-2">
                        <span class="text-sm font-medium text-cozy-textMuted flex items-center">
                            <i class="fa-regular fa-calendar mr-2"></i> ${formatTime(d.timestamp)}
                        </span>
                        ${iconHtml}
                    </div>
                    <p class="text-cozy-text whitespace-pre-wrap leading-relaxed">${escapeHTML(d.content)}</p>
                </div>
                `;
            });
            container.innerHTML = html;
        }

        function renderFriendsDiaries() {
            const container = document.getElementById('friends-diary-feed');
            const friends = DB.getFriends(currentUser);
            const diaries = DB.getDiaries().filter(d => friends.includes(d.author) && d.privacy === 'public');
            
            if(friends.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-16 bg-white rounded-2xl border border-cozy-border border-dashed">
                        <i class="fa-solid fa-user-group text-4xl text-cozy-border mb-3 block"></i>
                        <p class="text-cozy-textMuted">You haven't added any friends yet.<br>Go to the "Find Friends" tab to connect!</p>
                        <button onclick="switchTab('find-friends')" class="mt-4 text-cozy-primary hover:text-cozy-primaryHover font-medium underline">Find Friends</button>
                    </div>`;
                return;
            }
            
            if(diaries.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-16 bg-white rounded-2xl border border-cozy-border border-dashed">
                        <i class="fa-solid fa-book-open text-4xl text-cozy-border mb-3 block"></i>
                        <p class="text-cozy-textMuted">Your friends haven't shared any public diaries yet.</p>
                    </div>`;
                return;
            }
            
            let html = '';
            diaries.forEach(d => {
                html += `
                <div class="bg-cozy-card p-6 rounded-2xl border border-cozy-border shadow-sm hover:shadow-md transition duration-200">
                    <div class="flex justify-between items-start sm:items-center mb-4 border-b border-cozy-border/50 pb-4">
                        <div class="flex items-center">
                            <div class="w-10 h-10 rounded-full bg-cozy-secondary flex items-center justify-center text-cozy-primary font-bold text-lg mr-3">
                                ${d.author.charAt(0).toUpperCase()}
                            </div>
                            <div>
                                <h4 class="font-semibold text-cozy-text">${d.author}</h4>
                                <span class="text-xs text-cozy-textMuted">${formatTime(d.timestamp)}</span>
                            </div>
                        </div>
                    </div>
                    <p class="text-cozy-text whitespace-pre-wrap leading-relaxed">${escapeHTML(d.content)}</p>
                </div>
                `;
            });
            container.innerHTML = html;
        }

        // Friend System
        function renderFindFriends() {
            const container = document.getElementById('find-friends-content');
            const allUsers = DB.getUsers().filter(u => u !== currentUser);
            const friends = DB.getFriends(currentUser);
            const requests = DB.getFriendRequests();
            
            const pendingReceived = requests.filter(r => r.to === currentUser && r.status === 'pending').map(r => r.from);
            const pendingSent = requests.filter(r => r.from === currentUser && r.status === 'pending').map(r => r.to);
            
            const others = allUsers.filter(u => !friends.includes(u) && !pendingReceived.includes(u) && !pendingSent.includes(u));
            
            let html = '';
            
            // Pending Received
            if(pendingReceived.length > 0) {
                html += `<h3 class="text-lg font-semibold mb-3 text-cozy-text border-b border-cozy-border pb-1">Friend Requests (${pendingReceived.length})</h3><div class="space-y-3 mb-8">`;
                pendingReceived.forEach(user => {
                    html += `
                    <div class="flex items-center justify-between bg-cozy-bg p-4 rounded-xl border border-cozy-primary/30">
                        <div class="flex items-center">
                            <div class="w-10 h-10 rounded-full bg-white flex items-center justify-center text-cozy-primary font-bold mr-3 shadow-sm">
                                ${user.charAt(0).toUpperCase()}
                            </div>
                            <span class="font-medium text-cozy-text">${user}</span>
                        </div>
                        <button onclick="acceptRequest('${user}')" class="bg-cozy-primary text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-cozy-primaryHover transition shadow-sm">
                            Accept
                        </button>
                    </div>`;
                });
                html += `</div>`;
            }
            
            // Friends List
            if(friends.length > 0) {
                html += `<h3 class="text-lg font-semibold mb-3 text-cozy-text border-b border-cozy-border pb-1">My Friends (${friends.length})</h3><div class="space-y-3 mb-8 grid grid-cols-1 sm:grid-cols-2 gap-3">`;
                friends.forEach(user => {
                    html += `
                    <div class="flex items-center bg-white p-4 rounded-xl border border-cozy-border shadow-sm">
                        <div class="w-10 h-10 rounded-full bg-cozy-secondary flex items-center justify-center text-cozy-primary font-bold mr-3">
                            ${user.charAt(0).toUpperCase()}
                        </div>
                        <span class="font-medium text-cozy-text">${user}</span>
                        <span class="ml-auto text-xs bg-green-100 text-green-700 px-2 py-1 rounded-full"><i class="fa-solid fa-check mr-1"></i>Friends</span>
                    </div>`;
                });
                html += `</div>`;
            }

            // Discover Users
            html += `<h3 class="text-lg font-semibold mb-3 text-cozy-text border-b border-cozy-border pb-1">Discover Users</h3>`;
            if(others.length === 0) {
                html += `<div class="p-6 text-center bg-cozy-bg rounded-xl border border-cozy-border border-dashed"><p class="text-cozy-textMuted text-sm">No new users to discover.<br>Try creating a second account in another browser window to test!</p></div>`;
            } else {
                html += `<div class="space-y-3 mb-8">`;
                others.forEach(user => {
                    html += `
                    <div class="flex items-center justify-between bg-white p-4 rounded-xl border border-cozy-border shadow-sm hover:shadow-md transition">
                        <div class="flex items-center">
                            <div class="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center text-gray-500 font-bold mr-3">
                                ${user.charAt(0).toUpperCase()}
                            </div>
                            <span class="font-medium text-cozy-text">${user}</span>
                        </div>
                        <button onclick="sendRequest('${user}')" class="bg-cozy-secondary text-cozy-text font-medium px-4 py-2 rounded-lg text-sm hover:bg-cozy-secondaryHover transition">
                            Add Friend
                        </button>
                    </div>`;
                });
                html += `</div>`;
            }
            
            // Pending Sent
            if(pendingSent.length > 0) {
                html += `<h3 class="text-lg font-semibold mb-3 text-cozy-text mt-8 border-b border-cozy-border pb-1">Requests Sent</h3><div class="space-y-3">`;
                pendingSent.forEach(user => {
                    html += `
                    <div class="flex items-center justify-between bg-white p-4 rounded-xl border border-cozy-border opacity-70">
                        <div class="flex items-center">
                            <div class="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center text-gray-400 font-bold mr-3">
                                ${user.charAt(0).toUpperCase()}
                            </div>
                            <span class="font-medium text-gray-500">${user}</span>
                        </div>
                        <span class="text-sm text-gray-400 italic bg-gray-100 px-3 py-1 rounded-full">Pending</span>
                    </div>`;
                });
                html += `</div>`;
            }
            
            container.innerHTML = html;
        }

        window.sendRequest = function(targetUser) {
            DB.addFriendRequest(currentUser, targetUser);
            showToast(`Friend request sent to ${targetUser}!`, 'info');
            renderFindFriends();
        };

        window.acceptRequest = function(fromUser) {
            DB.acceptFriendRequest(fromUser, currentUser);
            showToast(`You are now friends with ${fromUser}!`, 'success');
            renderFindFriends();
        };

    </script>
</body>
</html>
